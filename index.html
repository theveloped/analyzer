<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STL Viewer</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <!-- Include three.js library from a CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126.1/build/three.min.js"></script>
    
    <!-- Include OrbitControls.js from a CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126.1/examples/js/controls/OrbitControls.js"></script>

    <!-- Include STLLoader.js from a CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.126.1/examples/js/loaders/STLLoader.js"></script>

    <!-- Include OBJLoader.js from a CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three/examples/js/loaders/OBJLoader.js"></script>

    <script>
        var scene = new THREE.Scene();
        scene.background = new THREE.Color('gainsboro');

        var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 10);

        var renderer = new THREE.WebGLRenderer({antialias: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        var controls = new THREE.OrbitControls(camera, renderer.domElement);

        // Hemisphere light for soft global illumination
        var hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        // Directional light from the top
        var dirLight = new THREE.DirectionalLight(0xffffff);
        dirLight.position.set(-3, 10, -10);
        scene.add(dirLight);

        // Directional light from the bottom
        var dirLight2 = new THREE.DirectionalLight(0xffffff);
        dirLight2.position.set(3, -10, 10);
        scene.add(dirLight2);

        const axesHelper = new THREE.AxesHelper( 5 );
        scene.add( axesHelper );

        // Material
        var material = new THREE.MeshPhongMaterial({
            color: 0x999999,
            specular: 0x101010,
            vertexColors: true
        });

        // Load OBJ model
        var mesh;
        var cacheBuster = 'v=' + Date.now();
        var objLoader = new THREE.OBJLoader();
        objLoader.load('fine_mesh.obj?' + cacheBuster, function (object) {
            object.traverse(function (child) {
                if (child instanceof THREE.Mesh) {
                    child.material = material;

                    // Initialize the color attribute with enough space for each vertex
                    const numVertices = child.geometry.attributes.position.count;
                    const colors = new Float32Array(numVertices * 3);
                    child.geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                    // Default color
                    for (let i = 0; i < numVertices; i++) {
                        colors.set([1, 1, 1], i * 3);
                    }

                    mesh = child;
                }
            });

            scene.add(mesh);

            // Function to color faces based on indices
            function colorFaces(mesh, indices, color) {
                const colorAttribute = mesh.geometry.attributes.color;
                indices.forEach(index => {
                    colorAttribute.setXYZ(index * 3, color.r, color.g, color.b);
                    colorAttribute.setXYZ(index * 3 + 1, color.r, color.g, color.b);
                    colorAttribute.setXYZ(index * 3 + 2, color.r, color.g, color.b);
                });
                colorAttribute.needsUpdate = true;
            }

            // Load indices from JSON and color the faces
            fetch('highlights.json?' + cacheBuster)
              .then(response => response.json())
              .then(data => {
                  //const trueIndices = data.undercut;
                  colorFaces(mesh, data.faces, new THREE.Color(0xff0000)); // Example color: red
              })
              .catch(error => console.error('Error loading indices:', error));

            // Adjust camera and controls
            var boundingBox = new THREE.Box3().setFromObject(mesh);
            var center = boundingBox.getCenter(new THREE.Vector3());
            var size = boundingBox.getSize(new THREE.Vector3());

            var maxDim = Math.max(size.x, size.y, size.z);
            var fov = camera.fov * (Math.PI / 180);
            var cameraZ = Math.abs(maxDim / 4 * Math.tan(fov * 2));

            cameraZ *= 2;
            camera.position.z = cameraZ;

            var minZ = boundingBox.min.z;
            camera.position.y = minZ;

            var direction = controls.target.clone()
                .sub(camera.position)
                .normalize()
                .multiplyScalar(cameraZ);
            controls.target = center;

            camera.lookAt(center.x, center.y, center.z);
            controls.update();

            animate();
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

    </script>
</body>
</html>
