<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Accessibility Viewer</title>
    <link rel="icon" href="data:,">
    <style>
        body { margin: 0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
        canvas { display: block; }
        #panel {
            position: absolute; top: 12px; left: 12px; width: 270px;
            background: rgba(24, 28, 33, 0.92); color: #dfe6ea; padding: 14px;
            border-radius: 10px; font-size: 13px; line-height: 1.45; z-index: 10;
            max-height: calc(100vh - 48px); overflow-y: auto;
        }
        #panel h1 { font-size: 14px; margin: 0 0 10px; }
        #panel label { display: block; margin: 8px 0 2px; color: #9fb0bd; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; }
        #panel select, #panel input[type=text], #panel input[type=number] {
            width: 100%; box-sizing: border-box; background: #10141a; color: #dfe6ea;
            border: 1px solid #3a4552; border-radius: 5px; padding: 5px 6px; font-size: 13px;
        }
        #panel .row { display: flex; gap: 8px; }
        #panel .row > div { flex: 1; }
        #legend div { display: flex; align-items: center; gap: 7px; margin: 3px 0; }
        #legend span.chip { width: 14px; height: 14px; border-radius: 3px; display: inline-block; flex: none; }
        #stats { margin-top: 10px; padding-top: 8px; border-top: 1px solid #3a4552; color: #9fb0bd; white-space: pre-line; }
        #pick { margin-top: 10px; padding-top: 8px; border-top: 1px solid #3a4552; white-space: pre-line; font-family: ui-monospace, monospace; font-size: 12px; }
        #ramp { height: 12px; border-radius: 3px; margin-top: 4px;
            background: linear-gradient(90deg, #30123b, #4145ab, #2ab07f, #fcce39, #f05b12, #7a0403); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="panel">
        <h1>Tool accessibility viewer</h1>

        <label>Direction / engine</label>
        <select id="source"></select>

        <label>View</label>
        <select id="mode">
            <option value="unified">Unified verdict (tool + holder)</option>
            <option value="access">Accessibility (undercuts)</option>
            <option value="class">Surface class (normal vs direction)</option>
            <option value="gap">Tip gap heatmap</option>
            <option value="stickout">Required stickout heatmap</option>
            <option value="diff">Engine diff (zmap vs voxel)</option>
            <option value="highlights">Last CLI highlights.json</option>
        </select>

        <label>Tool tip (diameter × corner radius)</label>
        <select id="tip"></select>

        <div class="row">
            <div>
                <label>Tolerance (mm)</label>
                <input id="tolerance" type="number" value="0.1" min="0" step="0.05">
            </div>
            <div>
                <label>Stickout (mm)</label>
                <input id="stickout" type="number" value="" placeholder="none">
            </div>
        </div>

        <label>Holder cylinders (radius:start, …)</label>
        <input id="holder" type="text" placeholder="e.g. 3:0, 8:40">

        <div id="scale-box">
            <label>Heatmap max (mm)</label>
            <input id="scale" type="number" value="" placeholder="auto">
            <div id="ramp"></div>
        </div>

        <label>Face rule</label>
        <select id="rule">
            <option value="all">blocked if all 3 vertices blocked (engine rule)</option>
            <option value="any">blocked if any vertex blocked</option>
        </select>

        <div class="row">
            <div>
                <label>Wall tolerance (°)</label>
                <input id="walltol" type="number" value="1.0" min="0" step="0.5">
            </div>
            <div>
                <label>&nbsp;</label>
                <label style="text-transform:none; margin-top:0"><input id="sidemill" type="checkbox" checked style="width:auto"> walls side-milled</label>
            </div>
        </div>

        <label><input id="mask" type="checkbox" checked style="width:auto"> grey out inaccessible faces</label>

        <div id="legend"></div>
        <div id="stats"></div>
        <div id="pick">click a face to inspect</div>
    </div>

    <script src="viewer/three.min.js"></script>
    <script src="viewer/OrbitControls.js"></script>
    <script src="viewer/OBJLoader.js"></script>

    <script>
    'use strict';

    // ------------------------------------------------------------- palette
    const COL = {
        ok:        [0.87, 0.90, 0.92],
        inaccess:  [0.28, 0.32, 0.38],
        tip:       [0.88, 0.29, 0.23],
        holder:    [0.95, 0.66, 0.23],
        side:      [0.44, 0.64, 0.86],
        zmapOnly:  [0.95, 0.66, 0.23],
        voxelOnly: [0.26, 0.52, 0.96],
        both:      [0.88, 0.29, 0.23],
        below:     [0.87, 0.90, 0.92],
        floor:     [0.62, 0.80, 0.58],
        slope:     [0.38, 0.68, 0.66],
        overhang:  [0.72, 0.42, 0.55],
    };
    // compact turbo-like ramp for scalar fields
    function rampColor(t) {
        t = Math.min(1, Math.max(0, t));
        const stops = [
            [0.19, 0.07, 0.23], [0.25, 0.27, 0.67], [0.17, 0.69, 0.50],
            [0.99, 0.81, 0.22], [0.94, 0.36, 0.07], [0.48, 0.02, 0.01],
        ];
        const x = t * (stops.length - 1);
        const i = Math.min(stops.length - 2, Math.floor(x));
        const f = x - i;
        return [0, 1, 2].map(k => stops[i][k] * (1 - f) + stops[i + 1][k] * f);
    }

    // ------------------------------------------------------------- state
    let manifest = null, faces = null, normals = null, mesh = null, colorAttr = null, faceCount = 0;
    let highlights = null;
    const fieldCache = new Map();

    // per-face angle (degrees) between the outward normal and the approach
    // direction: 0 = floor seen straight on, 90 = vertical wall, >90 = overhang
    function faceAngles(src) {
        const d = manifest.directions[src.direction];
        const out = new Float32Array(faceCount);
        for (let f = 0; f < faceCount; f++) {
            const dot = normals[3 * f] * d[0] + normals[3 * f + 1] * d[1] + normals[3 * f + 2] * d[2];
            out[f] = Math.acos(Math.min(1, Math.max(-1, dot))) * 180 / Math.PI;
        }
        return out;
    }

    async function fetchBin(name, Type) {
        if (fieldCache.has(name)) return fieldCache.get(name);
        const res = await fetch('viewer/' + name);
        if (!res.ok) throw new Error('missing ' + name);
        const arr = new Type(await res.arrayBuffer());
        fieldCache.set(name, arr);
        return arr;
    }

    const $ = id => document.getElementById(id);
    const sourceSel = $('source'), modeSel = $('mode'), tipSel = $('tip');

    function currentSource() { return manifest.sources[parseInt(sourceSel.value)] || null; }
    function currentTip() {
        const s = currentSource();
        return s && s.tips.length ? s.tips[parseInt(tipSel.value)] : null;
    }
    function holderCylinders() {
        const text = $('holder').value.trim();
        if (!text) return [];
        return text.split(',').map(part => {
            const [r, s] = part.split(':').map(Number);
            return { radius: r, start: s || 0 };
        }).filter(c => isFinite(c.radius) && c.radius > 0);
    }

    // find the matching cache of the other engine for diff mode
    function siblingSource(src) {
        const other = src.engine === 'zmap' ? 'voxel' : 'zmap';
        return manifest.sources.find(s => s.direction === src.direction && s.engine === other) || null;
    }
    function tipFile(src, tip) {
        const found = src.tips.find(t => t.diameter === tip.diameter && t.corner_radius === tip.corner_radius);
        return found ? found.file : null;
    }

    // --------------------------------------------------- field composition
    async function vertexGap(src, tip) {
        return fetchBin(tipFile(src, tip), Float32Array);
    }
    // per-vertex required stickout for the holder stack; null without holder.
    // Uses the tip-aware sreq fields (holder evaluated at feasible axis
    // positions, flank contact included) when precomputed for this tip, and
    // falls back to the vertex-centred clearance fields (a zero-diameter
    // tool assumption) otherwise — the stats line says which one is active.
    async function vertexMinStickout(src, tip) {
        const cylinders = holderCylinders();
        if (!cylinders.length) return null;
        const tipEntry = tip ? src.tips.find(t => t.diameter === tip.diameter && t.corner_radius === tip.corner_radius) : null;
        let out = null, approx = false;
        for (const cyl of cylinders) {
            const sEntry = tipEntry && tipEntry.stickouts
                ? tipEntry.stickouts.find(s => Math.abs(s.radius - cyl.radius) < 1e-9) : null;
            let field;
            if (sEntry) {
                field = await fetchBin(sEntry.file, Float32Array);
            } else {
                const cEntry = src.clearances.find(c => Math.abs(c.radius - cyl.radius) < 1e-9);
                if (!cEntry) throw new Error(`no field for holder radius ${cyl.radius} — precompute with --clearances ${cyl.radius}`);
                field = await fetchBin(cEntry.file, Float32Array);
                approx = true;
            }
            if (!out) out = new Float32Array(field.length).fill(-Infinity);
            for (let v = 0; v < field.length; v++) {
                const req = field[v] - cyl.start;
                if (req > out[v]) out[v] = req;
            }
        }
        for (let v = 0; v < out.length; v++) if (out[v] < 0) out[v] = 0;
        vertexMinStickout.approx = approx;
        return out;
    }
    async function faceAccess(src) {
        if (!src.accessibility) return null;
        return fetchBin(src.accessibility, Uint8Array);
    }

    // face verdict from per-vertex boolean lambda
    function faceBlocked(f, blockedAt, rule) {
        const a = blockedAt(faces[3 * f]), b = blockedAt(faces[3 * f + 1]), c = blockedAt(faces[3 * f + 2]);
        return rule === 'all' ? (a && b && c) : (a || b || c);
    }

    function paintFaces(colorOf) {
        for (let f = 0; f < faceCount; f++) {
            const [r, g, b] = colorOf(f);
            for (let k = 0; k < 3; k++) colorAttr.setXYZ(3 * f + k, r, g, b);
        }
        colorAttr.needsUpdate = true;
    }

    function legend(entries) {
        $('legend').innerHTML = entries.map(([c, label]) =>
            `<div><span class="chip" style="background: rgb(${c.map(x => Math.round(x * 255)).join(',')})"></span>${label}</div>`).join('');
    }

    function percentile(arr, p) {
        const sample = [];
        const step = Math.max(1, Math.floor(arr.length / 5000));
        for (let i = 0; i < arr.length; i += step) if (isFinite(arr[i])) sample.push(arr[i]);
        sample.sort((x, y) => x - y);
        return sample.length ? sample[Math.min(sample.length - 1, Math.floor(p * sample.length))] : 1;
    }

    // per-face mean of a per-vertex field, restricted to unmasked faces
    function faceValues(field, keep) {
        const out = new Float32Array(faceCount).fill(NaN);
        for (let f = 0; f < faceCount; f++) {
            if (keep && !keep(f)) continue;
            out[f] = (field[faces[3 * f]] + field[faces[3 * f + 1]] + field[faces[3 * f + 2]]) / 3;
        }
        return out;
    }
    async function accessKeep(src) {
        if (!$('mask').checked) return null;
        const access = await faceAccess(src);
        return access ? (f => !!access[f]) : null;
    }

    // --------------------------------------------------------- view modes
    async function update() {
        if (!mesh) return;
        const src = currentSource();
        const mode = modeSel.value;
        const tol = parseFloat($('tolerance').value) || 0;
        const rule = $('rule').value;
        const stickoutVal = parseFloat($('stickout').value);
        $('scale-box').classList.toggle('hidden', mode !== 'gap' && mode !== 'stickout');
        $('stats').textContent = '';
        try {
            if (mode === 'access') {
                const access = await faceAccess(src);
                if (!access) throw new Error('no accessibility.npy for this direction');
                let n = 0;
                paintFaces(f => access[f] ? (n++, COL.ok) : COL.inaccess);
                legend([[COL.ok, 'accessible (not an undercut)'], [COL.inaccess, 'undercut for this direction']]);
                $('stats').textContent = `${n} of ${faceCount} faces accessible`;

            } else if (mode === 'gap') {
                const tip = currentTip();
                if (!tip) throw new Error('no tip fields cached — run precompute --tips');
                const gap = await vertexGap(src, tip);
                const keep = await accessKeep(src);
                const vals = faceValues(gap, keep);
                const auto = Math.max(percentile(vals, 0.98), tol * 3, 0.2);
                const max = parseFloat($('scale').value) || auto;
                $('scale').placeholder = 'auto ' + auto.toFixed(2);
                paintFaces(f => {
                    if (isNaN(vals[f])) return COL.inaccess;
                    return vals[f] <= tol ? COL.below : rampColor((vals[f] - tol) / (max - tol));
                });
                legend([[COL.below, `gap ≤ tolerance (tip reaches)`], [rampColor(0.001), `just above tolerance`], [rampColor(1), `gap ≥ ${max.toFixed(2)} mm`], [COL.inaccess, 'inaccessible (greyed)']]);
                let n = 0;
                for (let f = 0; f < faceCount; f++)
                    if (!isNaN(vals[f]) && faceBlocked(f, v => gap[v] > tol, rule)) n++;
                $('stats').textContent = `${n} accessible faces blocked by the tip at tolerance ${tol}`;

            } else if (mode === 'class') {
                const angles = faceAngles(src);
                const wallTol = parseFloat($('walltol').value) || 0;
                const keep = await accessKeep(src);
                let nFloor = 0, nSlope = 0, nWall = 0, nOver = 0;
                paintFaces(f => {
                    if (keep && !keep(f)) return COL.inaccess;
                    const a = angles[f];
                    if (Math.abs(a - 90) <= wallTol) { nWall++; return COL.side; }
                    if (a > 90) { nOver++; return COL.overhang; }
                    if (a < 45) { nFloor++; return COL.floor; }
                    nSlope++; return COL.slope;
                });
                legend([
                    [COL.floor, '< 45° — bottom milling'],
                    [COL.slope, '45–90° — slope (ball / step milling)'],
                    [COL.side, `wall (90° ± ${wallTol}°) — side milling`],
                    [COL.overhang, '> 90° — overhang for this direction'],
                    [COL.inaccess, 'inaccessible (greyed)'],
                ]);
                $('stats').textContent = `floor ${nFloor} · slope ${nSlope} · wall ${nWall} · overhang ${nOver}`;

            } else if (mode === 'stickout') {
                const minStick = await vertexMinStickout(src, currentTip());
                if (!minStick) throw new Error('enter a holder stack to compute required stickout');
                const keep = await accessKeep(src);
                const vals = faceValues(minStick, keep);
                const auto = Math.max(percentile(vals, 0.98), 1);
                const max = parseFloat($('scale').value) || auto;
                $('scale').placeholder = 'auto ' + auto.toFixed(1);
                paintFaces(f => {
                    if (isNaN(vals[f])) return COL.inaccess;
                    return vals[f] <= tol ? COL.below : rampColor(vals[f] / max);
                });
                legend([[COL.below, 'no holder constraint'], [rampColor(0.5), `${(max / 2).toFixed(1)} mm needed`], [rampColor(1), `≥ ${max.toFixed(1)} mm needed`], [COL.inaccess, 'inaccessible (greyed)']]);
                $('stats').textContent = vertexMinStickout.approx
                    ? '⚠ vertex-centred approximation (no sreq fields for this tip — re-run precompute)'
                    : 'tip-aware stickout (holder at feasible axis positions)';

            } else if (mode === 'diff') {
                const tip = currentTip();
                const other = siblingSource(src);
                if (!tip || !other || !tipFile(other, tip))
                    throw new Error('diff needs the same tip cached for both engines (precompute --engine zmap and --engine voxel)');
                const gapA = await vertexGap(src, tip);
                const gapB = await fetchBin(tipFile(other, tip), Float32Array);
                const keep = await accessKeep(src);
                let nBoth = 0, nA = 0, nB = 0;
                paintFaces(f => {
                    if (keep && !keep(f)) return COL.inaccess;
                    const a = faceBlocked(f, v => gapA[v] > tol, rule);
                    const b = faceBlocked(f, v => gapB[v] > tol, rule);
                    if (a && b) { nBoth++; return COL.both; }
                    if (a) { nA++; return COL.zmapOnly; }
                    if (b) { nB++; return COL.voxelOnly; }
                    return COL.ok;
                });
                legend([[COL.both, 'blocked in both engines'], [COL.zmapOnly, `${src.engine} only`], [COL.voxelOnly, `${other.engine} only`], [COL.ok, 'reachable in both'], [COL.inaccess, 'inaccessible (greyed)']]);
                $('stats').textContent = `both ${nBoth} · ${src.engine} only ${nA} · ${other.engine} only ${nB}`;

            } else if (mode === 'highlights') {
                if (!highlights) throw new Error('no highlights.json in the working directory');
                const flagged = new Set(highlights);
                paintFaces(f => flagged.has(f) ? COL.tip : COL.ok);
                legend([[COL.tip, `flagged by last CLI run (${highlights.length} faces)`], [COL.ok, 'not flagged']]);

            } else { // unified
                const tip = currentTip();
                if (!tip) throw new Error('no tip fields cached — run precompute --tips');
                const gap = await vertexGap(src, tip);
                const access = await faceAccess(src);
                const minStick = await vertexMinStickout(src, tip);
                const useHolder = minStick && isFinite(stickoutVal);
                const angles = faceAngles(src);
                const wallTol = parseFloat($('walltol').value) || 0;
                const sideMill = $('sidemill').checked;
                let nTip = 0, nHold = 0, nOk = 0, nInv = 0, nSide = 0;
                paintFaces(f => {
                    if (access && !access[f]) { nInv++; return COL.inaccess; }
                    const holderBlocked = useHolder && faceBlocked(f, v => minStick[v] > stickoutVal + tol, rule);
                    if (sideMill && Math.abs(angles[f] - 90) <= wallTol) {
                        // near-vertical wall: finished by the tool flank, so the
                        // (bottom-)gap field does not apply — only the holder does
                        if (holderBlocked) { nHold++; return COL.holder; }
                        nSide++; return COL.side;
                    }
                    if (faceBlocked(f, v => gap[v] > tol, rule)) { nTip++; return COL.tip; }
                    if (holderBlocked) { nHold++; return COL.holder; }
                    nOk++; return COL.ok;
                });
                const entries = [[COL.ok, 'reachable (tool bottom)'], [COL.tip, 'blocked by tool tip'], [COL.inaccess, 'not accessible (undercut)']];
                if (sideMill) entries.splice(1, 0, [COL.side, 'wall — side-milled']);
                if (useHolder) entries.splice(entries.length - 1, 0, [COL.holder, 'blocked by holder / stickout']);
                legend(entries);
                $('stats').textContent = `reachable ${nOk}` + (sideMill ? ` · side-milled ${nSide}` : '') + ` · tip ${nTip}` +
                    (useHolder ? ` · holder ${nHold}` : '') + ` · inaccessible ${nInv}` +
                    (useHolder && vertexMinStickout.approx ? '\n⚠ holder check is vertex-centred (no sreq fields for this tip)' : '') +
                    (!useHolder && holderCylinders().length ? '\n(enter a stickout to apply the holder)' : '');
            }
        } catch (err) {
            legend([]);
            $('stats').textContent = '⚠ ' + err.message;
            paintFaces(() => COL.ok);
        }
    }

    // ------------------------------------------------------------- UI wiring
    function fillSources() {
        sourceSel.innerHTML = manifest.sources.map((s, i) => {
            const d = manifest.directions[s.direction].map(x => x.toFixed(2)).join(', ');
            return `<option value="${i}">dir ${s.direction} [${d}] — ${s.engine}</option>`;
        }).join('');
    }
    function fillTips() {
        const s = currentSource();
        tipSel.innerHTML = (s ? s.tips : []).map((t, i) => {
            const kind = t.corner_radius === 0 ? 'flat' : (t.corner_radius >= t.diameter / 2 ? 'ball' : 'bull');
            return `<option value="${i}">D${t.diameter} rc${t.corner_radius} (${kind})</option>`;
        }).join('');
    }
    sourceSel.onchange = () => { fillTips(); update(); };
    for (const id of ['mode', 'tip', 'tolerance', 'stickout', 'holder', 'rule', 'scale', 'mask', 'walltol', 'sidemill'])
        $(id).onchange = update;

    // ------------------------------------------------------------- three.js
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x21262c);
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new THREE.OrbitControls(camera, renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x445566, 1.0));
    const dir1 = new THREE.DirectionalLight(0xffffff, 0.55); dir1.position.set(-3, 10, -10); scene.add(dir1);
    const dir2 = new THREE.DirectionalLight(0xffffff, 0.35); dir2.position.set(3, -10, 10); scene.add(dir2);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // click to inspect
    const raycaster = new THREE.Raycaster();
    let downAt = null;
    renderer.domElement.addEventListener('pointerdown', e => { downAt = [e.clientX, e.clientY]; });
    renderer.domElement.addEventListener('pointerup', async e => {
        if (!mesh || !downAt || Math.hypot(e.clientX - downAt[0], e.clientY - downAt[1]) > 4) return;
        const ndc = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
        raycaster.setFromCamera(ndc, camera);
        const hit = raycaster.intersectObject(mesh)[0];
        if (!hit) { $('pick').textContent = 'click a face to inspect'; return; }
        const f = hit.faceIndex;
        const src = currentSource(), tip = currentTip();
        const lines = [`face ${f}  verts ${faces[3 * f]}, ${faces[3 * f + 1]}, ${faces[3 * f + 2]}`];
        try {
            const d = manifest.directions[src.direction];
            const dot = normals[3 * f] * d[0] + normals[3 * f + 1] * d[1] + normals[3 * f + 2] * d[2];
            lines.push(`normal angle: ${(Math.acos(Math.min(1, Math.max(-1, dot))) * 180 / Math.PI).toFixed(2)}°`);
            const access = await faceAccess(src);
            if (access) lines.push(`accessible: ${access[f] ? 'yes' : 'NO (undercut)'}`);
            if (tip) {
                const gap = await vertexGap(src, tip);
                lines.push(`tip gap: ${[0, 1, 2].map(k => gap[faces[3 * f + k]].toFixed(3)).join(' / ')} mm`);
            }
            const minStick = await vertexMinStickout(src, tip);
            if (minStick) lines.push(`required stickout${vertexMinStickout.approx ? ' (approx)' : ''}: ${[0, 1, 2].map(k => minStick[faces[3 * f + k]].toFixed(1)).join(' / ')} mm`);
            if (highlights) lines.push(`in highlights.json: ${new Set(highlights).has(f) ? 'yes' : 'no'}`);
        } catch (err) { lines.push('⚠ ' + err.message); }
        $('pick').textContent = lines.join('\n');
    });

    // ------------------------------------------------------------- loading
    async function boot() {
        manifest = await (await fetch('viewer/manifest.json')).json();
        faceCount = manifest.counts.faces;
        faces = await fetchBin('faces.bin', Uint32Array);
        normals = await fetchBin('normals.bin', Float32Array);
        try { highlights = (await (await fetch('highlights.json')).json()).faces; } catch (e) { highlights = null; }
        fillSources();
        fillTips();
        if (!manifest.sources.length) {
            $('stats').textContent = '⚠ no cached fields found — run:\npython main.py precompute <dir> --directions <i> --tips D:rc … --clearances r …\nthen restart the viewer';
        } else if (manifest.sources.every(s => !s.tips.length)) {
            $('stats').textContent = '⚠ direction caches exist but hold no tip fields — precompute with --tips (e.g. --tips 6:0 6:3)';
        }

        new THREE.OBJLoader().load('fine_mesh.obj?v=' + Date.now(), object => {
            object.traverse(child => {
                if (child instanceof THREE.Mesh) {
                    const n = child.geometry.attributes.position.count;
                    child.geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(n * 3).fill(0.9), 3));
                    child.material = new THREE.MeshPhongMaterial({ vertexColors: true, specular: 0x111111, shininess: 18 });
                    mesh = child;
                    colorAttr = child.geometry.attributes.color;
                }
            });
            scene.add(mesh);

            const box = new THREE.Box3().setFromObject(mesh);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3()).length();
            // look at the part from the first cached approach direction, slightly tilted
            const src = currentSource();
            const d = src ? manifest.directions[src.direction] : [0, 0, 1];
            const view = new THREE.Vector3(d[0], d[1], d[2]).normalize();
            const side = new THREE.Vector3(0, 1, 0);
            if (Math.abs(view.dot(side)) > 0.9) side.set(1, 0, 0);
            side.cross(view).normalize();
            camera.position.copy(center)
                .addScaledVector(view, size * 0.9)
                .addScaledVector(side, size * 0.45);
            camera.up.set(0, 0, 1);
            controls.target.copy(center);
            controls.update();

            update();
            (function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); })();
        });
    }
    boot();
    </script>
</body>
</html>
